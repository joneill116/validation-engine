# Pytest configuration for validation-engine tests

[tool:pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for categorizing tests
markers =
    unit: Unit tests for individual rules
    integration: Integration tests for full validation flows
    slow: Tests that take longer to run
    parametrize: Parametrized tests with multiple inputs

# Coverage options (if pytest-cov is installed)
# addopts = --cov=validation_engine --cov-report=term-missing

# Minimum Python version
minversion = 3.11
